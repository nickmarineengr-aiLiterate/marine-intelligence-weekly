<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>MEO QB Access — Marine Intelligence Weekly</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f172a;font-family:'Segoe UI',system-ui,sans-serif;padding:1rem}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.logo{color:#0d9488;font-weight:700;font-size:1.1rem;margin-bottom:4px}
.subtitle{color:#64748b;font-size:13px;margin-bottom:2rem}
h2{color:#f1f5f9;font-size:1.3rem;margin-bottom:1.5rem}
label{display:block;color:#94a3b8;font-size:13px;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;font-size:15px;outline:none;transition:border .2s}
input:focus{border-color:#0d9488}
.btn{width:100%;margin-top:1.25rem;padding:13px;background:#0d9488;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:#0f766e}
.error{color:#f87171;font-size:13px;margin-top:10px;display:none}
.help{color:#64748b;font-size:12px;margin-top:1.5rem;text-align:center}
.help a{color:#0d9488;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Marine Intelligence Weekly</div>
  <div class="subtitle">MEO Class 1 Question Bank</div>
  <h2>Enter your access password</h2>
  <label for="pwd">Password (sent in your purchase email)</label>
  <input type="password" id="pwd" placeholder="Enter password" autofocus>
  <div class="error" id="err">Incorrect password. Check your purchase email.</div>
  <button class="btn" onclick="checkPassword()">Access Question Bank →</button>
  <div class="help">
    Lost your password? <a href="mailto:contactus@marineintelligenceweekly.com">Email us</a>
  </div>
</div>
<script>
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}
function checkPassword(){
  const pwd = document.getElementById('pwd').value.trim();
  if(!pwd){ return; }
  // Send to verify endpoint
  fetch('/api/check-password',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:pwd})
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.success){
      // Set cookie
      document.cookie=`miw_qb_access=${pwd};path=/;max-age=${60*60*24*30};SameSite=Lax`;
      const redirect = getParam('redirect') || '/meoclass1/';
      window.location.href = redirect;
    } else {
      document.getElementById('err').style.display='block';
    }
  })
  .catch(()=>{
    document.getElementById('err').style.display='block';
  });
}
document.getElementById('pwd').addEventListener('keydown',e=>{
  if(e.key==='Enter') checkPassword();
});
</script>
</body>
</html>
