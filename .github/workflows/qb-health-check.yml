name: QB Health Check

on:
  schedule:
    # 03:00 UTC daily = 08:30 IST
    - cron: "0 3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (for the script itself)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run QB health check
        env:
          BREVO_SMTP_LOGIN: ${{ secrets.BREVO_SMTP_LOGIN }}
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          QB_HEALTH_EMAIL_TO: ${{ secrets.QB_HEALTH_EMAIL_TO }}
        run: python3 meoclass1/qb_health_check.py
